<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 — Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #F5F2EC;
      --surface:  #EDE9E0;
      --ink:      #1A1814;
      --ink-mid:  #7A7570;
      --ink-faint:#C2BDB5;
      --done:     #2E5E18;
      --done-bg:  #D6E9C9;
      --partial:  #8A5A0A;
      --partial-bg:#F5DFB0;
      --miss:     #862222;
      --miss-bg:  #F5C9C9;
      --future:   #D8D3CA;
      --past:     #E8E4DC;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 52px;
    }

    .year {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 0.9;
      color: var(--ink);
    }

    .tagline {
      margin-top: 14px;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-mid);
      font-weight: 400;
      font-style: italic;
    }

    /* ── STATS ── */
    .stats {
      display: flex;
      gap: 0;
      margin-bottom: 48px;
      border: 1px solid var(--ink-faint);
      border-radius: 12px;
      overflow: hidden;
    }

    .stat {
      padding: 16px 28px;
      text-align: center;
      border-right: 1px solid var(--ink-faint);
      flex: 1;
    }
    .stat:last-child { border-right: none; }

    .stat-n {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      line-height: 1;
      color: var(--ink);
    }

    .stat-label {
      margin-top: 5px;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(26, minmax(0, 1fr));
      gap: 4px;
      width: 100%;
      max-width: 780px;
    }

    .day {
      aspect-ratio: 1/1;
      border-radius: 4px;
      transition: transform 0.12s ease;
      cursor: default;
    }

    .day.past    { background: var(--past); cursor: pointer; }
    .day.past:hover { transform: scale(1.3); z-index: 2; position: relative; }

    .day.s-done.locked,
    .day.s-partial.locked,
    .day.s-miss.locked { cursor: pointer; }
    .day.future  { background: var(--future); cursor: pointer; }
    .day.today   { background: var(--future); cursor: pointer; outline: 2px solid var(--ink); outline-offset: 1px; }

    .day.future:hover,
    .day.today:hover  { transform: scale(1.3); z-index: 2; position: relative; }

    .day.s-done    { background: var(--done);    cursor: pointer; }
    .day.s-partial { background: var(--partial); cursor: pointer; }
    .day.s-miss    { background: var(--miss);    cursor: pointer; }

    .day.s-done:hover,
    .day.s-partial:hover,
    .day.s-miss:hover { transform: scale(1.3); z-index: 2; position: relative; }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 36px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
    }

    .swatch {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .sw-past    { background: var(--past); border: 1px solid var(--ink-faint); }
    .sw-future  { background: var(--future); }
    .sw-done    { background: var(--done); }
    .sw-partial { background: var(--partial); }
    .sw-miss    { background: var(--miss); }

    /* ── FOOTER ── */
    footer {
      margin-top: 60px;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }
  </style>
</head>
<body>

  <header>
    <div class="year">2026</div>
    <div class="tagline">Cada día que pasa, ya no vuelve</div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-n" id="cnt-done">0</div>
      <div class="stat-label"><span class="dot" style="background:var(--done)"></span>Todo bien</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="cnt-partial">0</div>
      <div class="stat-label"><span class="dot" style="background:var(--partial)"></span>A medias</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="cnt-miss">0</div>
      <div class="stat-label"><span class="dot" style="background:var(--miss)"></span>Sin cumplir</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="cnt-left">—</div>
      <div class="stat-label">Días restantes</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="legend">
    <div class="legend-item"><div class="swatch sw-past"></div>Pasado</div>
    <div class="legend-item"><div class="swatch sw-future"></div>Por venir</div>
    <div class="legend-item"><div class="swatch sw-done"></div>Todo bien</div>
    <div class="legend-item"><div class="swatch sw-partial"></div>A medias</div>
    <div class="legend-item"><div class="swatch sw-miss"></div>Sin cumplir</div>
  </div>

  <footer>365 oportunidades &nbsp;·&nbsp; Aprovéchalas</footer>

  <script>
    const grid = document.getElementById('grid');
    const TOTAL = 365;
    const STORAGE_KEY = 'tracker2026';

    const today = new Date();
    const yr = today.getFullYear();
    let todayDoy;
    if (yr === 2026) {
      todayDoy = Math.floor((today - new Date(2026, 0, 1)) / 86400000) + 1;
    } else {
      todayDoy = yr < 2026 ? 0 : 366;
    }

    const states = [null, 'done', 'partial', 'miss'];

    // Load from localStorage or start fresh
    let clicks;
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      clicks = saved ? JSON.parse(saved) : new Array(TOTAL + 1).fill(0);
      if (!Array.isArray(clicks) || clicks.length !== TOTAL + 1) {
        clicks = new Array(TOTAL + 1).fill(0);
      }
    } catch (e) {
      clicks = new Array(TOTAL + 1).fill(0);
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(clicks)); } catch (e) {}
    }

    function updateStats() {
      let d = 0, p = 0, m = 0;
      for (let i = 1; i <= TOTAL; i++) {
        if (clicks[i] === 1) d++;
        else if (clicks[i] === 2) p++;
        else if (clicks[i] === 3) m++;
      }
      document.getElementById('cnt-done').textContent    = d;
      document.getElementById('cnt-partial').textContent = p;
      document.getElementById('cnt-miss').textContent    = m;
      document.getElementById('cnt-left').textContent    = Math.max(0, TOTAL - todayDoy);
    }

    function applyState(el, i, locked) {
      el.className = 'day';
      if (clicks[i] === 0) {
        el.classList.add(locked ? 'past' : (i === todayDoy ? 'today' : 'future'));
      } else {
        el.classList.add('s-' + states[clicks[i]]);
        if (locked) el.classList.add('locked');
      }
    }

    for (let i = 1; i <= TOTAL; i++) {
      const el = document.createElement('div');
      const locked = i < todayDoy;

      applyState(el, i, locked);

      if (!locked) {
        el.addEventListener('click', () => {
          clicks[i] = (clicks[i] + 1) % 4;
          applyState(el, i, false);
          save();
          updateStats();
        });
      } else {
        // Past: se puede marcar pero no borrar (cicla entre los 3 estados)
        el.addEventListener('click', () => {
          clicks[i] = clicks[i] === 0 ? 1 : (clicks[i] % 3) + 1;
          applyState(el, i, true);
          save();
          updateStats();
        });
      }

      grid.appendChild(el);
    }

    updateStats();
  </script>
</body>
</html>
