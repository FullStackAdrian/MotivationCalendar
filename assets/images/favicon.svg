<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#F5F2EC"/>
  <!-- grid of dots: 4 columns x 5 rows -->
  <!-- row 1: past past past past -->
  <rect x="3"  y="3"  width="5" height="5" rx="1.5" fill="#E8E4DC"/>
  <rect x="10" y="3"  width="5" height="5" rx="1.5" fill="#E8E4DC"/>
  <rect x="17" y="3"  width="5" height="5" rx="1.5" fill="#E8E4DC"/>
  <rect x="24" y="3"  width="5" height="5" rx="1.5" fill="#E8E4DC"/>
  <!-- row 2: past past done done -->
  <rect x="3"  y="10" width="5" height="5" rx="1.5" fill="#E8E4DC"/>
  <rect x="10" y="10" width="5" height="5" rx="1.5" fill="#E8E4DC"/>
  <rect x="17" y="10" width="5" height="5" rx="1.5" fill="#2E5E18"/>
  <rect x="24" y="10" width="5" height="5" rx="1.5" fill="#2E5E18"/>
  <!-- row 3: done partial miss done -->
  <rect x="3"  y="17" width="5" height="5" rx="1.5" fill="#2E5E18"/>
  <rect x="10" y="17" width="5" height="5" rx="1.5" fill="#8A5A0A"/>
  <rect x="17" y="17" width="5" height="5" rx="1.5" fill="#862222"/>
  <rect x="24" y="17" width="5" height="5" rx="1.5" fill="#2E5E18"/>
  <!-- row 4: future future future future -->
  <rect x="3"  y="24" width="5" height="5" rx="1.5" fill="#D8D3CA"/>
  <rect x="10" y="24" width="5" height="5" rx="1.5" fill="#D8D3CA"/>
  <rect x="17" y="24" width="5" height="5" rx="1.5" fill="#D8D3CA"/>
  <rect x="24" y="24" width="5" height="5" rx="1.5" fill="#D8D3CA"/>
</svg>